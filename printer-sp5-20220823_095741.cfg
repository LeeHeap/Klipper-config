[include sp5/*.cfg]
[include common/*.cfg]

#---------------------------------------------------------------------------------
#
# XYZ Stepper drivers
#
#---------------------------------------------------------------------------------

[stepper_x] #Motor_0
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 32
rotation_distance: 40
endstop_pin: !PG6
position_endstop: 0
position_max: 300
homing_speed: 50

[stepper_y] #Motor_1
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 32
rotation_distance: 40
endstop_pin: !PG9
position_endstop: 300
position_max: 300
homing_speed: 50

[stepper_z] #Motor_2.1
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 32
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -10
position_max: 340

#[stepper_z1] #Motor_3
#step_pin: PG4
#dir_pin: !PC1
#enable_pin: !PA0
#microsteps: 32
#rotation_distance: 8


#---------------------------------------------------------------------------------
#
# TMC UART
#
#---------------------------------------------------------------------------------

[tmc2208 stepper_x] #Motor_0
uart_pin: PC4
run_current: 0.800
interpolate: false
stealthchop_threshold: 999999

[tmc2208 stepper_y] #Motor_1
uart_pin: PD11
run_current: 0.800
interpolate: false
stealthchop_threshold: 999999

[tmc2208 stepper_z] #Motor_2.1
uart_pin: PC6
run_current: 1
interpolate: false
stealthchop_threshold: 0#999999

#[tmc2208 stepper_z1] #Motor_3
#uart_pin: PC7
#run_current: 0.800
#interpolate: false
#stealthchop_threshold: 999999

[tmc2209 extruder] #Motor_4
uart_pin: PF2
run_current: 0.800
interpolate: false
stealthchop_threshold: 0

#---------------------------------------------------------------------------------
#
# Extruder
#
#---------------------------------------------------------------------------------

[extruder] #Motor_4
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
heater_pin: PA2 # HE0
sensor_pin:  PF4
microsteps: 32
rotation_distance: 3.4334763948497855
nozzle_diameter: 0.400
filament_diameter: 1.750
sensor_type: EPCOS 100K B57560G104F
#control: pid
#pid_Kp=19.212
#pid_Ki=0.667
#pid_Kd=138.330
min_temp: 0
max_temp: 265
pressure_advance: 0.035

[firmware_retraction]
retract_length: 0.4
retract_speed: 15
#unretract_extra_length: 0
unretract_speed: 10

#---------------------------------------------------------------------------------
#
# Bed probe
#
#---------------------------------------------------------------------------------

[safe_z_home]                         # enable for BLTouch
home_xy_position: 150, 150
speed: 100
z_hop: 10
z_hop_speed: 5

[bltouch]
sensor_pin: PB7
control_pin: PB6
pin_up_touch_mode_reports_triggered: True
probe_with_touch_mode: True
stow_on_each_sample: False
x_offset: -37#-34
y_offset: -30.5#-27.5    
#z_offset: 4.475#3.799
sample_retract_dist: 5.0              # Can be set lower, example 2.5 depending on height of bltouch from bed
lift_speed: 40
samples_tolerance_retries: 3
speed: 10
samples: 3
set_output_mode: 5V

[bed_mesh]                            # enable for BLTouch
speed: 200
mesh_min: 40,30.5#20, 20
mesh_max: 260,269.5#260, 260
algorithm: lagrange#bicubic
probe_count: 6,6#5,5#14,14
relative_reference_index: 18 #change with probe_count!
fade_start: 1
fade_end: 10
horizontal_move_z: 10

[bed_screws]
screw1: 58,50
screw2: 300,50
screw3: 300,290
screw4: 58,290

[screws_tilt_adjust]
screw1: 58,50
screw1_name: front left screw
screw2: 300,50
screw2_name: front right screw
screw3: 300,290
screw3_name: rear right screw
screw4: 58,290
screw4_name: rear left screw
horizontal_move_z: 10.
screw_thread: CW-M4

#[z_tilt]
#horizontal_move_z: 5
#z_positions:
#    -22, 148
#    322, 148
#points:
#    33,72
#    272,72
#    150,272

#---------------------------------------------------------------------------------
#
# Heaters
#
#---------------------------------------------------------------------------------

[heater_bed]
heater_pin: PA1
sensor_pin: PF3
sensor_type: EPCOS 100K B57560G104F
#control: pid
#pid_Kp=72.231
#pid_Ki=0.836
#pid_Kd=1560.183
min_temp: 0
max_temp: 130

[verify_heater heater_bed]
check_gain_time: 100

#---------------------------------------------------------------------------------
#
# Fans and temp sensors
#
#---------------------------------------------------------------------------------

[fan] #CNC_FAN0 - Part cooling fan
pin: PA8 

[heater_fan hotend_fan] #CNC_FAN1
pin: PE5 
heater: extruder
heater_temp: 50.0
max_power: 1.0

[controller_fan mcu_fan] #CNC_FAN2
pin: PD12 
stepper: stepper_x,stepper_y,stepper_z,extruder#,stepper_z1
#idle_timeout: 30
#fan_speed: .4

[controller_fan mcu_fan2]
pin: PD13 
stepper: stepper_x,stepper_y,stepper_z,extruder#,stepper_z1
#[temperature_fan exhaust_fan] #CNC_FAN3
#pin: PD13
#sensor_type: temperature_mcu
#max_temp: 70
#min_temp: 30
#target_temp: 45
#control: watermark


#[heater_fan sparefan4]
#pin: PD14 # FAN4

#[heater_fan sparefan5]
#pin: PD15 # FAN5

[temperature_sensor RPI]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
 
[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF5
min_temp: 0
max_temp: 100
gcode_id: C

#---------------------------------------------------------------------------------
#
# ADXL345 Accelerometer
#
#---------------------------------------------------------------------------------

[resonance_tester]
accel_chip: adxl345
probe_points: 150, 150, 20
#ADXL on MCU

[adxl345]
cs_pin: PA15
spi_software_sclk_pin: PB3
spi_software_mosi_pin: PB5
spi_software_miso_pin: PB4
#axes_map: x,y,z

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 67.6#68.6
shaper_type_y: zv #mzv
shaper_freq_y: 50.6

#---------------------------------------------------------------------------------
#
# Machine basics
#
#---------------------------------------------------------------------------------

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f429xx_440038000751303439373431-if00
#restart_method: command

[printer]
kinematics: corexy
max_velocity: 350 #250
max_accel: 6000#4500
max_z_velocity: 25
max_z_accel: 30
square_corner_velocity: 5

[respond]

#---------------------------------------------------------------------------------
#
# Display
#
#---------------------------------------------------------------------------------

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>

