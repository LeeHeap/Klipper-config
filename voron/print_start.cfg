# ============================================================
#  PrusaSlicer start G-code:
#    PRINT_START BED=[first_layer_bed_temperature] EXTRUDER=[first_layer_temperature] MATERIAL=[filament_type]
# ============================================================

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(190)|float %}
    {% set MATERIAL = params.MATERIAL|default("ABS")|string %}

    # --- Phase 1: Safe heating & homing ---
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1
    STATUS_BUSY
    G90                                        ; absolute positioning
    M107                                       ; part cooling fan off

    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED_TEMP}
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150    ; Tap-safe probing temp

    STATUS_HOMING
    M117 Homing
    HOME_IF_NEEDED
    G0 X175 Y175 Z50 F3600                    ; centre, 50mm above bed

    # --- Phase 2: Wait for bed & level gantry ---
    M117 Heating bed
    STATUS_HEATING
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP}

    M117 Quad Gantry Levelling
    STATUS_LEVELING
    QUAD_GANTRY_LEVEL

    M117 Re-homing Z
    STATUS_HOMING
    G28 Z

    # --- Phase 3: Adaptive bed mesh ---
    M117 Meshing bed
    STATUS_MESHING
    BED_MESH_CALIBRATE ADAPTIVE=1

    # --- Phase 4: Heat extruder (parked at rear — ooze falls safely) ---
    G0 X175 Y350 Z50 F6000                    ; park at rear before heating
    M117 Heating extruder
    STATUS_HEATING
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER_TEMP}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}

    # --- Phase 5: Clean nozzle ---
    M117 Cleaning nozzle
    clean_nozzle                               ; brush wipe (purge disabled, no bucket needed)

    # --- Phase 6: Purge line & start ---
    G0 X5 Y5 Z0.3 F6000                       ; move to front-left corner
    M117 Priming
    G91                                        ; relative positioning
    M83                                        ; relative extruder
    G1 X80 E18 F1000                           ; purge line
    G1 X40 E5 F1000                            ; taper off
    G1 E-0.6 F1500                             ; retract (matches firmware_retraction)
    G1 Z2 F3000                                ; lift
    G90                                        ; back to absolute
    G92 E0                                     ; reset extruder

    M117 Printing
    STATUS_PRINTING
