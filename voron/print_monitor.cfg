# ============================================================
#  Print Monitor — Claude Code Integration
#  Enable/disable via Fluidd macros, KlipperScreen, or HA
#  State persists across restarts via [save_variables]
#  State synced to MQTT for Home Assistant
# ============================================================

# --- Enable/Disable Switch ---

[gcode_macro PRINT_MONITOR]
description: Print monitor settings (variable store)
variable_enabled: False
gcode:
    {% if printer["gcode_macro PRINT_MONITOR"].enabled %}
        {action_respond_info("Print monitor is ENABLED")}
    {% else %}
        {action_respond_info("Print monitor is DISABLED")}
    {% endif %}

[gcode_macro ENABLE_PRINT_MONITOR]
description: Enable Claude Code print monitoring
gcode:
    SET_GCODE_VARIABLE MACRO=PRINT_MONITOR VARIABLE=enabled VALUE=True
    SAVE_VARIABLE VARIABLE=print_monitor_enabled VALUE=True
    RUN_SHELL_COMMAND CMD=mqtt_monitor_enable
    {action_respond_info("Print monitor ENABLED")}

[gcode_macro DISABLE_PRINT_MONITOR]
description: Disable Claude Code print monitoring
gcode:
    SET_GCODE_VARIABLE MACRO=PRINT_MONITOR VARIABLE=enabled VALUE=False
    SAVE_VARIABLE VARIABLE=print_monitor_enabled VALUE=False
    RUN_SHELL_COMMAND CMD=mqtt_monitor_disable
    STOP_PRINT_MONITOR
    {action_respond_info("Print monitor DISABLED")}

# Restore saved state on startup and sync to MQTT
[delayed_gcode _restore_print_monitor_state]
initial_duration: 6
gcode:
    {% set saved = printer.save_variables.variables.get('print_monitor_enabled', False) %}
    SET_GCODE_VARIABLE MACRO=PRINT_MONITOR VARIABLE=enabled VALUE={saved}
    {% if saved %}
        RUN_SHELL_COMMAND CMD=mqtt_monitor_enable
    {% else %}
        RUN_SHELL_COMMAND CMD=mqtt_monitor_disable
    {% endif %}
    {action_respond_info("Print monitor restored: %s" % ("enabled" if saved else "disabled"))}

# --- Shell commands ---

[gcode_shell_command start_print_monitor]
command: ssh -o ConnectTimeout=5 print-monitor "bash ~/print-monitor/start.sh"
timeout: 15
verbose: True

[gcode_shell_command stop_print_monitor]
command: ssh -o ConnectTimeout=5 print-monitor "bash ~/print-monitor/stop.sh"
timeout: 15
verbose: True

[gcode_shell_command mqtt_monitor_enable]
command: /home/lee/.local/bin/mqtt-publish -t "voron/monitor/enabled" -m "true" -r
timeout: 5
verbose: False

[gcode_shell_command mqtt_monitor_disable]
command: /home/lee/.local/bin/mqtt-publish -t "voron/monitor/enabled" -m "false" -r
timeout: 5
verbose: False

# --- Start/Stop macros ---

[gcode_macro START_PRINT_MONITOR]
description: Start Claude Code print monitoring (if enabled)
gcode:
    {% if printer["gcode_macro PRINT_MONITOR"].enabled %}
        {action_respond_info("Starting print monitor...")}
        RUN_SHELL_COMMAND CMD=start_print_monitor
    {% else %}
        {action_respond_info("Print monitor is disabled — skipping")}
    {% endif %}

[gcode_macro STOP_PRINT_MONITOR]
description: Stop Claude Code print monitoring
gcode:
    {action_respond_info("Stopping print monitor...")}
    RUN_SHELL_COMMAND CMD=stop_print_monitor
