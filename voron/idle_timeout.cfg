[idle_timeout]
timeout: 1800
gcode:
    {% if printer.pause_resume.is_paused %}
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
        {action_respond_info("Paused idle timeout: hotend off. Will reheat on Resume.")}
    {% else %}
        SLEEP
    {% endif %}

[gcode_macro SLEEP]
gcode:
  M84
  M107
  TURN_OFF_HEATERS
  SET_FAN_SPEED FAN=exhaust_fan SPEED=0
  SET_FAN_SPEED FAN=BedFans SPEED=0
  UPDATE_DELAYED_GCODE ID=_stop_exhaust DURATION=0  ; cancel any pending vent timer
  STATUS_OFF
[gcode_macro VENT_CHAMBER]
description: Run exhaust fan for 10 minutes then stop
gcode:
    SET_FAN_SPEED FAN=exhaust_fan SPEED=1.0
    UPDATE_DELAYED_GCODE ID=_stop_exhaust DURATION=600
    {action_respond_info("Exhaust fan on — will auto-stop in 10 minutes")}

[delayed_gcode _stop_exhaust]
gcode:
    SET_FAN_SPEED FAN=exhaust_fan SPEED=0
    {action_respond_info("Exhaust fan auto-stopped")}
