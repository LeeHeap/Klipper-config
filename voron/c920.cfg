[gcode_shell_command C920_disable_autofocus]
command: sh /home/lee/klipper_config/voron/scripts/c920_disable_autofocus.sh
timeout: 10
verbose: True

[gcode_shell_command shell_c920_zoom_in]
command: sh v4l2ctl --set-ctrl=zoom_absolute=250
timeout: 10
verbose: False

[gcode_shell_command shell_c920_zoom_out]
command: sh v4l2ctl --set-ctrl=zoom_absolute=100
timeout: 10
verbose: False

[gcode_shell_command shell_c920_pan_left]
command: sh v4l2ctl --set-ctrl=pan_absolute=-18000
timeout: 10
verbose: False

[gcode_shell_command shell_c920_pan_right]
command: sh v4l2ctl --set-ctrl=pan_absolute=18000
timeout: 10
verbose: False

[gcode_shell_command shell_c920_pan_reset]
command: sh v4l2ctl --set-ctrl=pan_absolute=0
timeout: 10
verbose: False

[gcode_macro c920_Zoom_in]
gcode:
    RUN_SHELL_COMMAND CMD=shell_c920_zoom_in

[gcode_macro c920_Zoom_out]
gcode:
    RUN_SHELL_COMMAND CMD=shell_c920_zoom_out

[gcode_macro c920_pan_left]
gcode:
    RUN_SHELL_COMMAND CMD=shell_c920_pan_left

[gcode_macro c920_pan_right]
gcode:
    RUN_SHELL_COMMAND CMD=shell_c920_pan_right

[gcode_macro c920_pan_reset]
gcode:
    RUN_SHELL_COMMAND CMD=shell_c920_pan_reset
