[gcode_macro SET_CASELIGHTS]
variable_value: 1
gcode:
    {% if 'VALUE' not in params %}
        {action_raise_error("Parameter missing from 'SET_CASELIGHTS'")}
    {% endif %}

    {% set state = params.VALUE %}

    {% if state %}
        {action_call_remote_method("set_wled_state", strip=lights, state=True, preset=1)}
    {% else %}
        {action_call_remote_method("set_wled_state", strip=lights, state=True)}
    {% endif %}

    SET_GCODE_VARIABLE MACRO=SET_CASELIGHTS VARIABLE=value value={state}