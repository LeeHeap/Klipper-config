[gcode_macro SET_CASELIGHTS]
# The variable below should be initialized to the startup value.  If your
# device is configured to be on at startup use "variable_value: 1"
variable_value: 1
gcode:
  {% if 'VALUE' not in params %}
    {action_raise_error("Parameter 'VALUE' missing from 'SET_CASELIGHTS'")}
  {% endif %}

  {% set state = params.VALUE %}

  {% if state %}
    {action_call_remote_method("set_wled_state", strip=lights, state=True, preset=1)} 
  #{action_call_remote_method("set_wled_state", strip=strip, state=True, preset=preset)}
  #SET_LED LED=extruder_flare RED=0.75 BLUE=0.2 GREEN=0.2 SYNC=0
  {% else %}
    # turn the WLED off
    {action_call_remote_method("set_wled_state", strip=lights, state=False, preset=1)}
    #SET_LED LED=extruder_flare RED=0 BLUE=0 GREEN=0 SYNC=0
  {% endif %}
  # Update the state of our variable.  This will inform Moonraker that
  # the device has changed its state.
  SET_GCODE_VARIABLE MACRO=SET_CASELIGHTS VARIABLE=value value={state}