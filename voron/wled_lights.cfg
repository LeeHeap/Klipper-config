# ============================================================
#  WLED Case Lighting — Preset-based status integration
#  8 presets configured in WLED web UI at 10.0.0.21
#  Called from STATUS_* macros in stealthburner_leds.cfg
#
#  Preset map:
#    1: Idle       — Solid warm white 30%
#    2: Heating    — Breathe deep orange
#    3: Printing   — Solid neutral white 85%
#    4: Homing/QGL — Scan blue
#    5: Cleaning   — Chase cyan
#    6: Complete   — Breathe green (auto-return to idle after 15min)
#    7: Error      — Breathe red slow
#    8: Paused     — Blink amber
# ============================================================

# --- Core preset switcher ---

[gcode_macro _SET_CASE_LEDS]
gcode:
    {% set PRESET = params.PRESET|default(1)|int %}
    # Cancel any pending timers on state change
    UPDATE_DELAYED_GCODE ID=_case_leds_complete_to_idle DURATION=0
    UPDATE_DELAYED_GCODE ID=_case_leds_idle_to_off DURATION=0
    {action_call_remote_method("set_wled_state", strip="lights", state=True, preset=PRESET)}

[gcode_macro _CASE_LEDS_OFF]
gcode:
    UPDATE_DELAYED_GCODE ID=_case_leds_complete_to_idle DURATION=0
    UPDATE_DELAYED_GCODE ID=_case_leds_idle_to_off DURATION=0
    {action_call_remote_method("set_wled_state", strip="lights", state=False)}

# --- Auto-transition timers ---

# Complete (green) -> Idle (warm white) after 15 minutes
[delayed_gcode _case_leds_complete_to_idle]
gcode:
    _SET_CASE_LEDS PRESET=1
    # Then idle -> off after 30 minutes
    UPDATE_DELAYED_GCODE ID=_case_leds_idle_to_off DURATION=600
    {action_respond_info("Case lights: complete -> idle")}

# Idle (warm white) -> Off after 30 minutes
[delayed_gcode _case_leds_idle_to_off]
gcode:
    _CASE_LEDS_OFF
    {action_respond_info("Case lights: idle -> off")}

# --- Manual control (existing, preserved for KlipperScreen/Fluidd) ---

[gcode_macro SET_CASELIGHTS]
variable_value: 1
gcode:
    {% if 'VALUE' not in params %}
        {action_raise_error("Parameter missing from 'SET_CASELIGHTS'")}
    {% endif %}
    {% set power = params.VALUE|int %}
    {% if power == 1 %}
        _SET_CASE_LEDS PRESET=1
    {% else %}
        _CASE_LEDS_OFF
    {% endif %}
    SET_GCODE_VARIABLE MACRO=SET_CASELIGHTS VARIABLE=value value={power}

[gcode_macro CASELIGHTS_OFF]
gcode:
    _CASE_LEDS_OFF

[gcode_macro CASELIGHTS_ON]
gcode:
    _SET_CASE_LEDS PRESET=1

# --- Test macros (tap in Fluidd to preview each state) ---

[gcode_macro TEST_WLED_IDLE]
description: Test WLED idle preset (warm white)
gcode:
    _SET_CASE_LEDS PRESET=1

[gcode_macro TEST_WLED_HEATING]
description: Test WLED heating preset (breathing orange)
gcode:
    _SET_CASE_LEDS PRESET=2

[gcode_macro TEST_WLED_PRINTING]
description: Test WLED printing preset (bright white)
gcode:
    _SET_CASE_LEDS PRESET=3

[gcode_macro TEST_WLED_HOMING]
description: Test WLED homing/QGL preset (scanning blue)
gcode:
    _SET_CASE_LEDS PRESET=4

[gcode_macro TEST_WLED_CLEANING]
description: Test WLED cleaning preset (chase cyan)
gcode:
    _SET_CASE_LEDS PRESET=5

[gcode_macro TEST_WLED_COMPLETE]
description: Test WLED complete preset (breathing green)
gcode:
    _SET_CASE_LEDS PRESET=6

[gcode_macro TEST_WLED_ERROR]
description: Test WLED error preset (breathing red)
gcode:
    _SET_CASE_LEDS PRESET=7

[gcode_macro TEST_WLED_PAUSED]
description: Test WLED paused preset (blinking amber)
gcode:
    _SET_CASE_LEDS PRESET=8

[gcode_macro TEST_WLED_OFF]
description: Test WLED off
gcode:
    _CASE_LEDS_OFF
