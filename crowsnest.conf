#### crowsnest.conf
#### This is a typical default config.
#### Also used as default in mainsail / MainsailOS
#### See:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md
#### for details to configure to your needs.


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: /home/lee/printer_data/logs/crowsnest.log
log_level: verbose                      # Valid Options are quiet/verbose/debug
delete_log: false                       # Deletes log on every restart, if set to true
no_proxy: false

[cam 1]
mode: camera-streamer			#ustreamer                         # ustreamer - Provides mjpg and snapshots. (All devices)
                                        # camera-streamer - Provides webrtc, mjpg and snapshots. (rpi + Raspi OS based only)
enable_rtsp: true                      # If camera-streamer is used, this enables also usage of an rtsp server
rtsp_port: 8554                         # Set different ports for each device!
port: 8080                              # HTTP/MJPG Stream/Snapshot Port
device: /dev/v4l/by-id/usb-046d_HD_Pro_Webcam_C920-video-index0 
#/dev/video0                     # See Log for available ...
resolution: 1280x720                    # Reduced from 1920x1080 — both cameras share USB 2.0 bus; C920 at 1080p reserves Alt=10 isochronous bandwidth (see UVC_QUIRK_FIX_BANDWIDTH investigation in crowsnest notes)
max_fps: 15                             # If Hardware Supports this it will be forced, otherwise ignored/coerced.
#custom_flags:                          # You can run the Stream Services with custom flags.
#v4l2ctl:                               # Add v4l2-ctl parameters to setup your camera, see Log what your cam is capable of.

[cam 2]
mode: ustreamer                         # camera-streamer stalls this camera — periodic GET_DEF on unsupported UVC control 12 blocks capture pipeline
enable_rtsp: false                     # ustreamer does not support RTSP
rtsp_port: 8555
port: 8081
device: /dev/v4l/by-id/usb-Arducam_Arducam_IMX179_8MP_Camera_YLAF20221208V0-video-index0
resolution: 1280x720                    # Reduced from 1080p — leaves HW codec free for C920 WebRTC H264 pipeline
max_fps: 15
custom_flags: --encoder=CPU             # Prevents hardware codec contention with camera-streamer on /dev/video10+11
