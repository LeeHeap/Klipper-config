[include common/*.cfg]
[include ender3max/*.cfg]

#---------------------------------------------------------------------------------
#
# XYZ Stepper drivers
#
#---------------------------------------------------------------------------------

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 300
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: -15
position_min: -15
position_max: 300

homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
#endstop_pin: ^PC2
#position_endstop: 0.0
endstop_pin: probe:z_virtual_endstop    # enable to use BLTouch
position_min: -10                        # enable to use BLTouch
position_max: 340

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[safe_z_home]                         # enable for BLTouch
home_xy_position: 150, 150
speed: 100
z_hop: 10
z_hop_speed: 5


[bltouch]                             # enable for BLTouch - fast-mode
sensor_pin: ^PC14
control_pin: PA1
pin_up_touch_mode_reports_triggered: True
probe_with_touch_mode: True
x_offset: 57 # was -38 on old mount
y_offset: 0
#z_offset: 0.0
stow_on_each_sample: False
sample_retract_dist: 5.0              # Can be set lower, example 2.5 depending on height of bltouch from bed
lift_speed: 40
samples_tolerance_retries: 3
speed: 10
samples: 3
set_output_mode: 5V

[bed_mesh]                            # enable for BLTouch
speed: 120
mesh_min: 77, 20
mesh_max: 280, 280
algorithm: lagrange#bicubic
probe_count: 6,6#14,14#7,7
relative_reference_index: 18
fade_start: 1
fade_end: 10                      # 49 points due to large bed size
horizontal_move_z: 10

[firmware_retraction]
retract_length: 0.4
retract_speed: 15 #   The speed of retraction, in mm/s. The default is 20 mm/s.
#unretract_extra_length: 0
unretract_speed: 10

[gcode_macro G29]                    # If moving from marlin to klipper uncomment to mimic G29
gcode:
 BED_MESH_CALIBRATE
 G1 X0 Y0 Z10 F4000

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
#  G0 X150 Y150 Z50

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
rotation_distance: 3.4334763948497855
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 11.01
#pid_Ki: 0.59
#pid_Kd: 51.75
min_temp: 0
max_temp: 265
pressure_advance: 0.03

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 1.000
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
control: pid
pid_Kp: 333.44
pid_Ki: 60.40
pid_Kd: 1227.04
min_temp: 0
max_temp: 130

[heater_fan nozzle_cooling_fan]
pin: PC7

[fan]
pin: PC6

[temperature_sensor RPI]
sensor_type: temperature_host
min_temp: 10
max_temp: 100
 
[temperature_sensor MCU]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_37FFD8054253373736862057-if00

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3000
max_z_velocity: 15
max_z_accel: 100

[screws_tilt_adjust]
screw1: 0, 30.5 
screw1_name: front left screw
screw2: 212.5, 30.5
screw2_name: front right screw
screw3: 212.5, 269.5
screw3_name: rear right screw
screw4: 0, 269.5
screw4_name: front left screw
horizontal_move_z: 10.
screw_thread: CW-M4

[bed_screws]
screw1: 30.5,30.5   #front left
screw2: 269.5,30.5  #front right
screw3: 269.5,269.5 #back right
screw4: 30.5,269.5  #back left

#[display]
#lcd_type: st7920
#cs_pin: PA3
#sclk_pin: PA1
#sid_pin: PC1
#encoder_pins: ^PD2, ^PD3
#click_pin: ^!PC0

[static_digital_output usb_pullup_enable]
pins: !PA14

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8,  EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PB15, EXP1_10=<5V>

[display] 
lcd_type: st7920 
cs_pin: EXP1_7 
sclk_pin: EXP1_6 
sid_pin: EXP1_8 
encoder_pins: EXP1_5, EXP1_3 
click_pin: !EXP1_2

