#
# KlipperScreen Configuration — Voron 2.4 350
# Tailored for: Octopus + EBB36 CAN, Stealthburner, Tap, CW2
#

# =============================================
#  General Settings
# =============================================
[main]
move_speed_xy = 150
move_speed_z = 30
print_estimate_method = slicer
print_sort_dir = date_desc
show_cursor = False
print_view = list
screen_blanking = 900
confirm_estop = True

# =============================================
#  Printer Definition
# =============================================
[printer Voron 2.4]
titlebar_items = MCU, RPI
invert_z = False
extrude_distances = 5, 10, 25, 50
extrude_speeds = 1, 2, 5, 10

# =============================================
#  Preheat Presets
# =============================================
[preheat PLA]
extruder = 200
heater_bed = 60

[preheat PETG]
extruder = 240
heater_bed = 80

[preheat ABS]
extruder = 245
heater_bed = 110

[preheat ABS (eSun)]
extruder = 235
heater_bed = 110

[preheat ABS (Sunlu)]
extruder = 255
heater_bed = 110

[preheat ASA]
extruder = 250
heater_bed = 105

[preheat TPU]
extruder = 230
heater_bed = 50

[preheat Bed Only]
heater_bed = 110

[preheat Cooldown]
extruder = 0
heater_bed = 0

# =============================================
#  Menus — Prep
# =============================================
[menu __main actions prep]
name = Prep
icon = bed-level

[menu __main actions prep home]
name = Home All
icon = home
method = printer.gcode.script
params = {"script":"G28"}

[menu __main actions prep qgl]
name = Quad Gantry Level
icon = bed-level
method = printer.gcode.script
params = {"script":"QUAD_GANTRY_LEVEL"}

[menu __main actions prep g32]
name = G32 (Home+QGL)
icon = bed-level
method = printer.gcode.script
params = {"script":"G32"}

[menu __main actions prep bedmesh]
name = Bed Mesh
icon = bed-mesh
method = printer.gcode.script
params = {"script":"BED_MESH_CALIBRATE"}

[menu __main actions prep cleannozzle]
name = Clean Nozzle
icon = extruder
method = printer.gcode.script
params = {"script":"clean_nozzle"}

[menu __main actions prep center]
name = Move to Centre
icon = move
method = printer.gcode.script
params = {"script":"G28\nG0 X175 Y175 Z50 F6000"}

# =============================================
#  Menus — Filament
# =============================================
[menu __main actions filament]
name = Filament
icon = filament

[menu __main actions filament easy_change]
name = Easy Filament Change
icon = filament
method = printer.gcode.script
params = {"script":"EASY_FILAMENT_CHANGE"}
confirm = Heat to 220C and move to front for filament swap?

[menu __main actions filament change_done]
name = Filament Change Done
icon = complete
method = printer.gcode.script
params = {"script":"FILAMENT_CHANGE_DONE"}
confirm = Purge 50mm then cool to 150C?

# =============================================
#  Menus — Filament
# =============================================
[menu __main actions filament]
name = Filament
icon = filament

[menu __main actions filament easy_change]
name = Easy Filament Change
icon = filament
method = printer.gcode.script
params = {"script":"EASY_FILAMENT_CHANGE"}
confirm = Heat to 220C and move to front for filament swap?

[menu __main actions filament change_done]
name = Filament Change Done
icon = complete
method = printer.gcode.script
params = {"script":"FILAMENT_CHANGE_DONE"}
confirm = Purge 50mm then cool to 150C?

# =============================================
#  Menus — Calibrate
# =============================================
[menu __main actions calibrate]
name = Calibrate
icon = complete

[menu __main actions calibrate inputshaper]
name = Input Shaper
icon = move
method = printer.gcode.script
params = {"script":"SHAPER_CALIBRATE"}

[menu __main actions calibrate pa]
name = Pressure Advance
icon = arrow-down
method = printer.gcode.script
params = {"script":"CALIBRATE_PA"}
confirm = This will start a PA calibration print. Continue?

[menu __main actions calibrate pidhotend]
name = PID Hotend
icon = heater
method = printer.gcode.script
params = {"script":"PID_CALIBRATE HEATER=extruder TARGET=245"}
confirm = PID tune hotend to 245C?

[menu __main actions calibrate pidbed]
name = PID Bed
icon = bed
method = printer.gcode.script
params = {"script":"PID_CALIBRATE HEATER=heater_bed TARGET=110"}
confirm = PID tune bed to 110C? This takes ~10 min.

[menu __main actions calibrate speedtest]
name = Speed Test
icon = speed+
method = printer.gcode.script
params = {"script":"speed_test_fast"}
confirm = Run speed test? Ensure bed is clear.

