# ============================================================
#  Easy Filament Change Macros
#  EASY_FILAMENT_CHANGE  -- Prep printer for manual swap
#  FILAMENT_CHANGE_DONE  -- Purge and return after swap
# ============================================================

[gcode_macro EASY_FILAMENT_CHANGE]
description: Home, heat to 220C, move to front for filament swap
gcode:
    HOME_IF_NEEDED                                        ; home if not already homed
    G90                                                   ; absolute positioning
    G1 Z50 F900                                           ; raise Z to 50mm safe height
    M117 Heating for filament change...
    M109 S220                                             ; heat to 220C and wait
    G1 X175 Y0 F6000                                      ; move to front centre
    _SET_CASE_LEDS PRESET=9                               ; filament change WLED preset
    M117 Ready -- swap filament, then tap FILAMENT_CHANGE_DONE

[gcode_macro FILAMENT_CHANGE_DONE]
description: Purge new filament, cool to 150C and park after swap
gcode:
    _SET_CASE_LEDS PRESET=1                               ; return to idle WLED preset
    M117 Purging...
    M83                                                   ; relative extrusion
    G1 E50 F300                                           ; extrude 50mm at 5mm/s
    G4 P500                                               ; brief pause for filament to settle
    M104 S150                                             ; start cooling to 150C
    M117 Cooling to 150C...
    M109 S150                                             ; wait until cooled to 150C
    G90                                                   ; absolute positioning
    G1 X175 Y175 F6000                                    ; move to centre park
    M117 Filament change complete
