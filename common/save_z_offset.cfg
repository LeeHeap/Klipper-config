# ============================================================
#  SAVE_Z_OFFSET — Correct baby-step saving for Voron Tap
# ============================================================
#
#  WARNING: Do NOT use Klipper's built-in Z_OFFSET_APPLY_PROBE
#  with Voron Tap. It applies the wrong sign, making the offset
#  drift in the opposite direction from intended.
#
#  Workflow:
#    1. Start a print, baby-step Z during first layer until perfect
#    2. Run SAVE_Z_OFFSET in the console
#    3. Run SAVE_CONFIG when convenient (restarts Klipper)
#
#  See Z_OFFSET_TAP_BUG.md in the config repo for full explanation.
# ============================================================

[gcode_macro SAVE_Z_OFFSET]
description: Save baby-stepped Z offset to probe config (corrected for Voron Tap)
gcode:
    {% set gcode_z = printer.gcode_move.homing_origin.z %}
    {% set current_offset = printer.configfile.settings.probe.z_offset %}
    {% set new_offset = current_offset + gcode_z %}

    {% if gcode_z == 0 %}
        { action_respond_info("No Z baby-step adjustment active — nothing to save.") }
    {% else %}
        { action_respond_info("Current probe z_offset: %.3f" % current_offset) }
        { action_respond_info("Baby-step Z adjustment: %+.3f" % gcode_z) }
        { action_respond_info("New probe z_offset:     %.3f" % new_offset) }
        # Negate the gcode offset so Z_OFFSET_APPLY_PROBE's internal
        # subtraction becomes addition (correct for Tap, where nozzle IS probe)
        SET_GCODE_OFFSET Z={ gcode_z * -1 }
        Z_OFFSET_APPLY_PROBE
        SET_GCODE_OFFSET Z=0
        { action_respond_info("New z_offset queued. Run SAVE_CONFIG to persist.") }
    {% endif %}
