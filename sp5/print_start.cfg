[gcode_macro START_PRINT]
gcode:
    #Get Printer built volume dimensions
    {% set X_MAX = printer.toolhead.axis_maximum.x|default(100)|float %}
    {% set Y_MAX = printer.toolhead.axis_maximum.y|default(100)|float %}
    {% set Z_MAX = printer.toolhead.axis_maximum.z|default(100)|float %}

    #Get Bed and Extruder temperature from Slicer GCode
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}

    G90 #set absolute positioning
    M107 #disable part cooling fan
    G0 X{X_MAX/2} Y{Y_MAX/2} Z50 F3600 #move extruder 50mm above bed centre

    #Preheat nozzle and bed
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={BED_TEMP} #heat up bed
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150 #hold extruder at 150
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={BED_TEMP} #wait for bed to hit target temp                            

    #Home
    G28
    BED_MESH_PROFILE LOAD=default
    #Move up to clean bed
    G1 Y{Y_MAX - 20} Z{Z_MAX/4.0} F6000                

    #Heat nozzle and bed
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={EXTRUDER_TEMP}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={EXTRUDER_TEMP}                     

    #Precondition extruder
    M83 #relative extruder mode
    G92 E0